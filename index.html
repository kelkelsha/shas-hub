<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sha's Hub</title>

<style>

/* ===== DEBUT CSS ===== */

:root{
  --terracotta-1:#7b3f31;
  --terracotta-2:#9a5a49;
  --terracotta-3:#4d2720;
  --terracotta-4:#b86c56;
  --green:#85a271;
  --white:#f7f0ea;
}

/* reset */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html, body{
  width:100%;
  height:100%;
  /* FIX TV : pas de overflow:hidden sur html pour éviter les bugs navigateur TV */
  overflow:hidden;
  font-family:Arial, Helvetica, sans-serif;
  color:var(--white);
}

/* ===== FOND ===== */

body{
  position:relative;
  background:
    radial-gradient(circle at 15% 25%, rgba(184,108,86,.18), transparent 18%),
    radial-gradient(circle at 82% 22%, rgba(130,145,106,.14), transparent 18%),
    radial-gradient(circle at 68% 78%, rgba(184,108,86,.12), transparent 20%),
    linear-gradient(135deg, var(--terracotta-3) 0%, #261712 22%, var(--terracotta-1) 45%, var(--terracotta-2) 72%, #2b1712 100%);
}

body::before{
  content:"";
  position:absolute;
  inset:-12%;
  pointer-events:none;
  background:
    radial-gradient(circle at 12% 28%, rgba(255,255,255,.08), transparent 12%),
    radial-gradient(circle at 27% 62%, rgba(255,255,255,.06), transparent 14%),
    radial-gradient(circle at 48% 18%, rgba(255,255,255,.06), transparent 13%),
    radial-gradient(circle at 72% 36%, rgba(255,255,255,.05), transparent 15%),
    radial-gradient(circle at 88% 76%, rgba(255,255,255,.06), transparent 14%);
  /* FIX TV : filter:blur coûteux sur vieux GPU → réduit */
  filter:blur(30px);
  opacity:.9;
}

/* ===== PAGE ===== */

.page{
  width:100%;
  height:100%;
  position:relative;
}

/* ===== TITRE ===== */

.title{
  display:flex;
  justify-content:center;
  margin-top:2vh;
}

.title img{
  width:clamp(200px, 30vw, 480px);
  filter:drop-shadow(0 0 18px rgba(133,162,113,.55));
}

/* ===== STRUCTURE ===== */

.rows{
  height:calc(100% - 14vh);
  display:flex;
  flex-direction:column;
  justify-content:space-evenly;
  align-items:center;
  position:relative;
}

.row{
  position:relative;
  width:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:15vh;
}

/* ===== ROBOTS ===== */

.robot{
  position:absolute;
  left:8%;
  top:50%;
  transform:translateY(-50%);
}

.robot img{
  width:clamp(80px, 11vw, 160px);
  display:block;
}

/* ===== BLOC CENTRAL ===== */

.content{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:10px;
}

/* ===== LOGOS ===== */

.logos{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:clamp(16px, 2.5vw, 45px);
}

.card{
  width:clamp(120px, 15vw, 240px);
  height:clamp(85px, 11vh, 170px);
  display:flex;
  align-items:center;
  justify-content:center;
  transition:transform .15s ease;
  outline:none;
  border-radius:8px;
}

.logos .card{
  min-width:clamp(120px, 15vw, 240px);
}

.card img{
  width:clamp(80px, 11vw, 178px);
  height:auto;
  object-fit:contain;
  display:block;
  transition:filter .15s ease;
  filter:
    drop-shadow(0 0 2px rgba(255,255,255,.18))
    drop-shadow(0 0 6px rgba(133,162,113,.16));
}

.card.google img{
  width:clamp(84px, 11.5vw, 184px);
}

/* FIX TV : hover souvent ignoré sur TV, on mise tout sur :focus */
.card:hover,
.card:focus,
.card.focused{
  transform:scale(1.06);
}

/* FIX TV : visuel de focus clair et visible à distance */
.card:focus,
.card.focused{
  box-shadow:
    0 0 0 3px var(--green),
    0 0 18px rgba(133,162,113,.6),
    0 0 40px rgba(133,162,113,.3);
}

.card:hover img,
.card:focus img,
.card.focused img{
  filter:
    drop-shadow(0 0 4px rgba(255,255,255,.28))
    drop-shadow(0 0 10px rgba(133,162,113,.70))
    drop-shadow(0 0 22px rgba(133,162,113,.60))
    drop-shadow(0 0 34px rgba(133,162,113,.38));
}

/* ===== SEPARATEURS ===== */

.separator{
  width:clamp(200px, 35vw, 500px);
  height:2px;
  background:var(--green);
  opacity:.5;
}

/* FIX LIGNE GOOGLE */
.row:last-child{
  margin-bottom:0;
}

.row:last-child .content{
  transform:none;
}

/* ===== FIN CSS ===== */

</style>

</head>

<body>

<div class="page">

  <!-- ===== TITRE ===== -->

  <div class="title">
    <img src="titre.svg" alt="Sha's Hub">
  </div>

  <!-- ===== DEBUT ROWS ===== -->

  <div class="rows">


<!-- ===== LIGNE 1 (index 0,1,2) ===== -->
<div class="row" data-row="0">
  <div class="robot">
    <img src="robot_lunettes.svg" alt="">
  </div>
  <div class="content">
    <div class="logos">
      <a class="card" href="https://www.netflix.com/browse" tabindex="-1" data-row="0" data-col="0">
        <img src="Netflix.svg" alt="Netflix">
      </a>
      <a class="card" href="https://youtube.com/tv" tabindex="-1" data-row="0" data-col="1">
        <img src="Youtube.svg" alt="YouTube">
      </a>
      <a class="card" href="https://www.primevideo.com" tabindex="-1" data-row="0" data-col="2">
        <img src="Prime_Video.svg" alt="Prime Video">
      </a>
    </div>
    <div class="separator"></div>
  </div>
</div>

<!-- ===== LIGNE 2 (index 1,2) ===== -->
<div class="row" data-row="1">
  <div class="robot">
    <img src="robot_casque.svg" alt="">
  </div>
  <div class="content">
    <div class="logos">
      <a class="card" href="https://music.apple.com/fr/home" tabindex="-1" data-row="1" data-col="0">
        <img src="Apple_Music.svg" alt="Apple Music">
      </a>
      <a class="card" href="https://open.spotify.com" tabindex="-1" data-row="1" data-col="1">
        <img src="Spotify.svg" alt="Spotify">
      </a>
    </div>
    <div class="separator"></div>
  </div>
</div>

<!-- ===== LIGNE 3 (index 0) ===== -->
<div class="row" data-row="2">
  <div class="robot">
    <img src="robot_ordi.svg" alt="">
  </div>
  <div class="content">
    <div class="logos">
      <a class="card google" href="https://www.google.com" tabindex="-1" data-row="2" data-col="0">
        <img src="Google.svg" alt="Google">
      </a>
    </div>
  </div>
</div>


  </div>
  <!-- ===== FIN ROWS ===== -->

</div>

<script>
/*
  FIX NAVIGATION TV
  On utilise une grille 2D (row, col) au lieu d'un index linéaire.
  Comme chaque ligne a un nombre différent de cartes, la navigation
  linéaire (index + 3) causait des sauts incohérents.
  Ici, ↓ reste dans la même colonne (ou la plus proche) en changeant de ligne.
*/

// Grille : tableau de tableaux de cards, organisés par ligne
const grid = [];
const rows = document.querySelectorAll('.row');

rows.forEach(function(row) {
  const rowCards = Array.from(row.querySelectorAll('.card'));
  if (rowCards.length > 0) grid.push(rowCards);
});

let currentRow = 0;
let currentCol = 0;

function getCard(r, c) {
  if (r < 0 || r >= grid.length) return null;
  const row = grid[r];
  // Si la colonne demandée dépasse la longueur de la ligne, on prend la dernière
  const col = Math.min(c, row.length - 1);
  return row[col];
}

function setFocus(r, c) {
  // Retire le focus actuel
  const prev = getCard(currentRow, currentCol);
  if (prev) prev.classList.remove('focused');

  currentRow = r;
  // Clamp col à la taille de la ligne cible
  currentCol = Math.min(c, grid[r].length - 1);

  const next = getCard(currentRow, currentCol);
  if (next) next.classList.add('focused');
}

// Focus initial
setFocus(0, 0);

document.addEventListener('keydown', function(e) {
  switch(e.key) {

    case 'ArrowRight':
      e.preventDefault();
      if (currentCol < grid[currentRow].length - 1) {
        setFocus(currentRow, currentCol + 1);
      }
      break;

    case 'ArrowLeft':
      e.preventDefault();
      if (currentCol > 0) {
        setFocus(currentRow, currentCol - 1);
      }
      break;

    case 'ArrowDown':
      e.preventDefault();
      if (currentRow < grid.length - 1) {
        // On garde la même colonne (ou la plus proche si la ligne suivante est plus courte)
        setFocus(currentRow + 1, currentCol);
      }
      break;

    case 'ArrowUp':
      e.preventDefault();
      if (currentRow > 0) {
        setFocus(currentRow - 1, currentCol);
      }
      break;

    case 'Enter':
      e.preventDefault();
      const card = getCard(currentRow, currentCol);
      if (card) window.location.href = card.href;
      break;
  }
});

// Support souris (fallback)
grid.forEach(function(row, r) {
  row.forEach(function(card, c) {
    card.addEventListener('mouseenter', function() {
      setFocus(r, c);
    });
    card.addEventListener('click', function(e) {
      e.preventDefault();
      window.location.href = card.href;
    });
  });
});
</script>

</body>
</html>
