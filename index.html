<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sha's Hub</title>
    <style>
      :root {
        --terracotta-1: #7b3f31;
        --terracotta-2: #9a5a49;
        --terracotta-3: #4d2720;
        --terracotta-4: #b86c56;
        --green: #85a271;
        --white: #f7f0ea;
      }

      * {
        box-sizing: border-box;
      }

      body {
        background: radial-gradient(circle at 15% 25%, rgba(184,108,86,.18), transparent 18%),
    radial-gradient(circle at 82% 22%, rgba(130,145,106,.14), transparent 18%),
    radial-gradient(circle at 68% 78%, rgba(184,108,86,.12), transparent 20%),
    linear-gradient(135deg, var(--terracotta-3) 0%, #261712 22%, var(--terracotta-1) 45%, var(--terracotta-2) 72%, #2b1712 100%);
      }

      body::before {
        content: "";
        position: absolute;
        inset: -12%;
        pointer-events: none;
        background: radial-gradient(circle at 12% 28%, rgba(255, 255, 255, .08), transparent 12%), radial-gradient(circle at 27% 62%, rgba(255, 255, 255, .06), transparent 14%), radial-gradient(circle at 48% 18%, rgba(255, 255, 255, .06), transparent 13%), radial-gradient(circle at 72% 36%, rgba(255, 255, 255, .05), transparent 15%), radial-gradient(circle at 88% 76%, rgba(255, 255, 255, .06), transparent 14%);
        filter: blur(30px);
        opacity: .9;
      }

      body, html {
        height: 100dvh;
        width: 100dvw;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      .page {
        height: 100%;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        padding: 20px;
        gap: 32px;
      }

      .title {
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .title img {
        width: 30%;
        max-height: 20dvh;
      }

      .rows {
        flex: 1;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 6dvh;
      }

      .row {
        flex: 1;
        position: relative;
        width: 100%;
        display: flex;
        flex-direction: column;
        justify-content: center;
      }

      .content {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: end;
        justify-content: center;
        gap: 3dvw;
      }

      .card {
        height: 100%;
        display: flex;
        justify-content: center;
        align-items: end;
        width: 20dvw;
        border-radius: 8px;
      }

      .card.focused {
        box-shadow: 0 0 0 3px var(--green), 0 0 18px rgba(133, 162, 113, .6), 0 0 40px rgba(133, 162, 113, .3);
        transform: scale(1.06);
      }

      .card.focused img {
        filter: drop-shadow(0 0 4px rgba(255, 255, 255, .28)) drop-shadow(0 0 10px rgba(133, 162, 113, .70)) drop-shadow(0 0 22px rgba(133, 162, 113, .60)) drop-shadow(0 0 34px rgba(133, 162, 113, .38));
      }

      .card img {
        width: 9dvw;
        max-height: 15dvh;
      }

      .separator {
        position: absolute;
        bottom: -3dvh;
        left: 50%;
        transform: translateX(-50%);
        margin: auto;
        width: 50%;
        height: 2px;
        background: var(--green);
        opacity: .5;
      }

      .theme {
        position: absolute;
        left: 0;
        top: 50%;
        transform: translateY(-50%);
        height: 100%;
      }

      .theme img {
        height: 100%;
      }
    </style>
  </head>
  <body>
    <div class="page">
      <div class="title">
        <img src="./titre.svg" alt="">
      </div>
      <div class="rows">
        <div class="row">
          <div class="theme">
            <img src="./robot_lunettes.svg" alt="robot_lunettes">
          </div>
          <div class="content">
            <a class="card" href="https://www.netflix.com/browse">
              <img src="./Netflix.svg" alt="Netflix" />
            </a>
            <a class="card" href="https://youtube.com/tv">
              <img src="./Youtube.svg" alt="Youtube" />
            </a>
            <a class="card" href="https://www.primevideo.com">
              <img src="./Prime_Video.svg" alt="Prime" />
            </a>
          </div>
          <div class="separator"></div>
        </div>
        <div class="row">
          <div class="theme">
            <img src="./robot_casque.svg" alt="robot_casque">
          </div>
          <div class="content">
            <a class="card" href="https://music.apple.com/fr/home">
              <img src="./Apple_Music.svg" alt="Apple_Music.svg" />
            </a>
            <a class="card" href="https://open.spotify.com">
              <img src="./Spotify.svg" alt="Spotify.svg" />
            </a>
          </div>
          <div class="separator"></div>
        </div>
        <div class="row">
          <div class="theme">
            <img src="./robot_ordi.svg" alt="robot_ordi">
          </div>
          <div class="content">
            <a class="card" href="https://www.google.com">
              <img src="./Google.svg" alt="Google.svg" />
            </a>
          </div>
        </div>
      </div>
    </div>
    <script>
      /*
        FIX NAVIGATION TV
        On utilise une grille 2D (row, col) au lieu d'un index linéaire.
        Comme chaque ligne a un nombre différent de cartes, la navigation
        linéaire (index + 3) causait des sauts incohérents.
        Ici, ↓ reste dans la même colonne (ou la plus proche) en changeant de ligne.
      */

      // Grille : tableau de tableaux de cards, organisés par ligne
      const grid = [];
      const rows = document.querySelectorAll('.row');

      rows.forEach(function(row) {
        const rowCards = Array.from(row.querySelectorAll('.card'));
        if (rowCards.length > 0) grid.push(rowCards);
      });

      let currentRow = 0;
      let currentCol = 0;

      console.log({ grid, rows })

      function getCard(r, c) {
        if (r < 0 || r >= grid.length) return null;
        const row = grid[r];
        // Si la colonne demandée dépasse la longueur de la ligne, on prend la dernière
        const col = Math.min(c, row.length - 1);
        return row[col];
      }

      function setFocus(r, c) {
        // Retire le focus actuel
        const prev = getCard(currentRow, currentCol);
        if (prev) prev.classList.remove('focused');

        currentRow = r;
        // Clamp col à la taille de la ligne cible
        currentCol = Math.min(c, grid[r].length - 1);

        const next = getCard(currentRow, currentCol);
        if (next) next.classList.add('focused');
      }

      // Focus initial
      setFocus(0, 0);

      document.addEventListener('keydown', function(e) {
        switch(e.key) {

          case 'ArrowRight':
            e.preventDefault();
            if (currentCol < grid[currentRow].length - 1) {
              setFocus(currentRow, currentCol + 1);
            }
            break;

          case 'ArrowLeft':
            e.preventDefault();
            if (currentCol > 0) {
              setFocus(currentRow, currentCol - 1);
            }
            break;

          case 'ArrowDown':
            e.preventDefault();
            if (currentRow < grid.length - 1) {
              // On garde la même colonne (ou la plus proche si la ligne suivante est plus courte)
              setFocus(currentRow + 1, currentCol);
            }
            break;

          case 'ArrowUp':
            e.preventDefault();
            if (currentRow > 0) {
              setFocus(currentRow - 1, currentCol);
            }
            break;

          case 'Enter':
            e.preventDefault();
            const card = getCard(currentRow, currentCol);
            if (card) window.location.href = card.href;
            break;
        }
      });

      // Support souris (fallback)
      grid.forEach(function(row, r) {
        row.forEach(function(card, c) {
          card.addEventListener('mouseenter', function() {
            setFocus(r, c);
          });
          card.addEventListener('click', function(e) {
            e.preventDefault();
            window.location.href = card.href;
          });
        });
      });
    </script>
  </body>
</html>
